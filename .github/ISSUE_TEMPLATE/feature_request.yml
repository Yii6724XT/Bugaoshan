name: 功能请求 / Feature Request
description: 建议新功能或改进 / Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请尽量详细描述你希望的功能。
        Thanks for your suggestion! Please describe the feature in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: 功能描述 / Feature Description
      description: 清晰描述你希望添加的功能 / Clearly describe the feature you'd like
      placeholder: 我希望能够...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景 / Use Case
      description: 这个功能能解决什么问题？/ What problem does this solve?
      placeholder: 当我需要...的时候，这个功能会很有用

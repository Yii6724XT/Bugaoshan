# .github/workflows/trigger-ohos.yml
name: Trigger OHOS Build

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'      # lib 改了才触发
      - 'assets/**'
      - 'pubspec.yaml'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger OHOS submodule build
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: assumeengagetry/TEMP-HOMO
          event-type: lib-updated
